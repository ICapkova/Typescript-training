<!DOCTYPE html>

<html lang="cs-cz">
    <head>
        <meta charset="utf-8" />
        <title>Boolean v JavaScriptu</title>
    </head>

    <body>
        <script>
            const sirka = 50;
            const vyska = 100;
            const jeSirsi = sirka > vyska;
            const jeVyssi = vyska > sirka;

            document.body.innerHTML += jeSirsi; // vypíše true
            document.body.innerHTML += "<br>";
            document.body.innerHTML += jeVyssi; // vypíše false
            </script>
    </body>
</html>
